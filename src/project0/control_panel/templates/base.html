<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAAS Control Panel</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="status-bar">
    <div class="status-info">
      <strong>MAAS Control</strong>
      <span class="state state-{{ maas_state }}">● {{ maas_state }}</span>
      {% if maas_pid is not none %}<span class="pid">PID {{ maas_pid }}</span>{% endif %}
      {% if maas_last_exit_code is not none and maas_state == "crashed" %}
        <span class="exit-code">exit: {{ maas_last_exit_code }}</span>
      {% endif %}
    </div>
    <div class="status-actions">
      <form method="post" action="/maas/start">
        <button type="submit" class="btn-start" {% if maas_state in ("starting","running","stopping") %}disabled{% endif %}>▶ Start</button>
      </form>
      <form method="post" action="/maas/stop">
        <button type="submit" class="btn-stop" {% if maas_state != "running" %}disabled{% endif %}>■ Stop</button>
      </form>
      <form method="post" action="/maas/restart">
        <button type="submit" class="btn-restart" {% if maas_state != "running" %}disabled{% endif %}>↻ Restart</button>
      </form>
    </div>
  </header>
  <nav class="main-nav">
    <a href="/">Home</a>
    <a href="/profile">Profile</a>
    <a href="/facts">Facts</a>
    <a href="/toml">TOML</a>
    <a href="/personas">Personas</a>
    <a href="/env">.env</a>
    <a href="/usage">Usage</a>
    <a href="/reviews">Reviews</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
